{% load static %}
<!doctype html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ product.name }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/"> Mini Shop </a>

        <a class="btn btn-outline-light" href="{% url 'cart_page' %}">
          <i class="bi-cart-fill me-1"></i>
          Cart
          <span class="badge bg-light text-dark ms-1 rounded-pill"
            >{{ cart_count }}</span
          >
        </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row">
        <div class="col-md-6">
          <div id="productCarousel" class="carousel slide">
            <div class="carousel-inner">
              {% if product.image %}
              <div class="carousel-item active">
                <img
                  src="{{ product.image.url }}"
                  class="d-block w-100 img-fluid rounded"
                  alt="{{ product.name }}"
                />
              </div>
              {% elif product.image_url %}
              <div class="carousel-item active">
                <img
                  src="{{ product.image_url }}"
                  class="d-block w-100 img-fluid rounded"
                  alt="{{ product.name }}"
                />
              </div>
              {% endif %} {% for image in product.images.all %}
              <div
                class="carousel-item {% if not product.image and not product.image_url and forloop.first %}active{% endif %}"
              >
                <img
                  src="{{ image.image.url }}"
                  class="d-block w-100 img-fluid rounded"
                  alt="{{ product.name }}"
                />
              </div>
              {% endfor %}
            </div>

            <button
              class="carousel-control-prev product-carousel-button"
              type="button"
              data-bs-target="#productCarousel"
              data-bs-slide="prev"
            >
              <span class="carousel-control-prev-icon"></span>
            </button>

            <button
              class="carousel-control-next product-carousel-button"
              type="button"
              data-bs-target="#productCarousel"
              data-bs-slide="next"
            >
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>

        <div class="col-md-6">
          <h1>{{ product.name }}</h1>

          <h3 class="text-success mt-3">${{ product.price }}</h3>

          <p class="mt-4">{{ product.description }}</p>

          <a
            href="{% url 'add_to_cart' product.id %}"
            class="btn btn-dark btn-lg"
          >
            Add to Cart
          </a>
          <a href="{% url 'checkout_page' %}" class="btn btn-dark btn-lg ms-4">
            CHECKOUT
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
