{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ product.name }}</title>

    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/"> Mini Shop </a>

        <a class="btn btn-outline-light" href="{% url 'cart_page' %}">
          <i class="bi-cart-fill me-1"></i>
          Cart
          <span class="badge bg-light text-dark ms-1 rounded-pill"
            >{{ cart_count }}</span
          >
        </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row">
        <div class="col-md-6">
          <img
            src="{{ product.image_url }}"
            class="img-fluid rounded"
            alt="{{ product.name }}"
          />
        </div>

        <div class="col-md-6">
          <h1>{{ product.name }}</h1>

          <h3 class="text-success mt-3">${{ product.price }}</h3>

          <p class="mt-4">{{ product.description }}</p>

          <a
            href="{% url 'add_to_cart' product.id %}"
            class="btn btn-dark btn-lg"
          >
            Add to Cart
          </a>
          <a href="{% url 'checkout_page' %}" class="btn btn-dark btn-lg ms-4">
            CHECKOUT
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
