{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Checkout | Mini Shop</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    s
    <nav class="navbar navbar-dark bg-dark">
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="/"> Mini Shop </a>

        <a class="btn btn-outline-light" href="{% url 'cart_page' %}">
          <i class="bi bi-cart-fill me-1"></i>

          Cart

          <span class="badge bg-light text-dark ms-1 rounded-pill">
            {{ cart_count }}
          </span>
        </a>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-5">
              <h2 class="fw-bold mb-4">Checkout</h2>

              <form method="post" action="{% url 'place_order' %}">
                {% csrf_token %}
                <div class="row">
                  <div class="col-md-6 mb-4">
                    <label class="form-label"> First Name </label>

                    <input
                      type="text"
                      name="first_name"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-4">
                    <label class="form-label"> Last Name </label>

                    <input
                      type="text"
                      name="last_name"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label"> Email Address </label>

                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label class="form-label"> Shipping Address </label>

                  <input
                    type="text"
                    name="address"
                    class="form-control"
                    required
                  />
                </div>

                <div class="row">
                  <div class="col-md-6 mb-4">
                    <label class="form-label"> City </label>

                    <input
                      type="text"
                      name="city"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-4">
                    <label class="form-label"> Postal Code </label>

                    <input
                      type="text"
                      name="postal_code"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label"> Card Number </label>

                  <input
                    type="text"
                    name="card_number"
                    class="form-control"
                    placeholder="1234 5678 9012 3456"
                    required
                  />
                </div>

                <div class="row">
                  <div class="col-md-6 mb-4">
                    <label class="form-label"> Expiration Date </label>

                    <input
                      type="text"
                      class="form-control"
                      placeholder="MM/YY"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-4">
                    <label class="form-label"> CVV </label>

                    <input type="text" class="form-control" required />
                  </div>
                </div>

                <button type="submit" class="btn btn-dark w-100 py-3 mt-3">
                  Place Order
                </button>
                <a href="/" class="btn btn-outline-dark w-100 mt-4 py-3">
                  Continue Shopping
                </a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="py-5 bg-dark mt-auto">
      <div class="container">
        <p class="m-0 text-center text-white">
          Copyright &copy; Mini Shop 2026
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
